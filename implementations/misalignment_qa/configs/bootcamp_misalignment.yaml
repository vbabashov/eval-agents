    condition_metadata:
      condition: examples-and-priority-instruction
      model: gemini-3.1-flash-lite-preview
      provider: google

  - id: examples-llm-msg-priority__claude-opus-4-7
    display_label: "Examples (LLM messages + priority) / Claude Opus 4.7"
    agent:
      provider: litellm
      model: anthropic/claude-opus-4-7
      api_key_env: ANTHROPIC_API_KEY
      temperature: ~  # claude-opus-4-7 has deprecated this parameter
      system_prompt: |
